services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ROLE: api
      APP_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ANALYSIS_MODEL: ${OPENAI_ANALYSIS_MODEL:-gpt-4.1}
      OPENAI_SUPPORT_MODEL: ${OPENAI_SUPPORT_MODEL:-gpt-4.1-mini}
      OPENAI_QUERY_MODEL: ${OPENAI_QUERY_MODEL:-gpt-4.1-mini}
      OPENAI_TEST_MODEL: ${OPENAI_TEST_MODEL:-gpt-4.1-mini}
      SCRAPEDO_KEY: ${SCRAPEDO_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      USE_CRAWL4AI: ${USE_CRAWL4AI:-false}
      COMPARE_CRAWLERS: ${COMPARE_CRAWLERS:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-}
      CLOUDFLARE_R2_REGION: ${CLOUDFLARE_R2_REGION:-auto}
      EXTERNAL_TIMEOUT_SECONDS: ${EXTERNAL_TIMEOUT_SECONDS:-20}
      EXTERNAL_MAX_RETRIES: ${EXTERNAL_MAX_RETRIES:-3}
      SCRAPER_MAX_CONCURRENT_REQUESTS: ${SCRAPER_MAX_CONCURRENT_REQUESTS:-4}
      CRAWL4AI_TIMEOUT_SECONDS: ${CRAWL4AI_TIMEOUT_SECONDS:-15}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-10}
      JOB_TTL_SECONDS: ${JOB_TTL_SECONDS:-21600}
      JOB_POLL_TIMEOUT_SECONDS: ${JOB_POLL_TIMEOUT_SECONDS:-5}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    expose:
      - "8000"
    networks:
      - osint

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["python", "-m", "workers.worker"]
    environment:
      APP_ROLE: worker
      APP_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ANALYSIS_MODEL: ${OPENAI_ANALYSIS_MODEL:-gpt-4.1}
      OPENAI_SUPPORT_MODEL: ${OPENAI_SUPPORT_MODEL:-gpt-4.1-mini}
      OPENAI_QUERY_MODEL: ${OPENAI_QUERY_MODEL:-gpt-4.1-mini}
      OPENAI_TEST_MODEL: ${OPENAI_TEST_MODEL:-gpt-4.1-mini}
      SCRAPEDO_KEY: ${SCRAPEDO_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      USE_CRAWL4AI: ${USE_CRAWL4AI:-false}
      COMPARE_CRAWLERS: ${COMPARE_CRAWLERS:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-}
      CLOUDFLARE_R2_REGION: ${CLOUDFLARE_R2_REGION:-auto}
      EXTERNAL_TIMEOUT_SECONDS: ${EXTERNAL_TIMEOUT_SECONDS:-20}
      EXTERNAL_MAX_RETRIES: ${EXTERNAL_MAX_RETRIES:-3}
      SCRAPER_MAX_CONCURRENT_REQUESTS: ${SCRAPER_MAX_CONCURRENT_REQUESTS:-4}
      CRAWL4AI_TIMEOUT_SECONDS: ${CRAWL4AI_TIMEOUT_SECONDS:-15}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-10}
      JOB_TTL_SECONDS: ${JOB_TTL_SECONDS:-21600}
      JOB_POLL_TIMEOUT_SECONDS: ${JOB_POLL_TIMEOUT_SECONDS:-5}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
      WORKER_HEARTBEAT_FILE: ${WORKER_HEARTBEAT_FILE:-/tmp/osint-worker-heartbeat}
      WORKER_HEARTBEAT_MAX_AGE_SECONDS: ${WORKER_HEARTBEAT_MAX_AGE_SECONDS:-120}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/worker_healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - osint

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "6379"
    networks:
      - osint

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      OSINT_PUBLIC_API_URL: ${OSINT_PUBLIC_API_URL:-}
      STATIC_ASSET_VERSION: ${STATIC_ASSET_VERSION:-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "8080"
    networks:
      - osint

  nginx:
    build:
      context: ./deploy/nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "80"
    networks:
      - osint

volumes:
  redis-data:

networks:
  osint:
    driver: bridge
