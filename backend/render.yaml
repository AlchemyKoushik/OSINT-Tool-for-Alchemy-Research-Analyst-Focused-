services:
  - type: web
    name: osint-tool-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
  - type: worker
    name: osint-tool-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m workers.worker
