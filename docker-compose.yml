services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ROLE: api
      APP_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    expose:
      - "8000"
    networks:
      - osint

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["python", "-m", "workers.worker"]
    environment:
      APP_ROLE: worker
      APP_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKER_HEARTBEAT_FILE: ${WORKER_HEARTBEAT_FILE:-/tmp/osint-worker-heartbeat}
      WORKER_HEARTBEAT_MAX_AGE_SECONDS: ${WORKER_HEARTBEAT_MAX_AGE_SECONDS:-120}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/worker_healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - osint

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "6379"
    networks:
      - osint

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      OSINT_PUBLIC_API_URL: ${OSINT_PUBLIC_API_URL:-}
      STATIC_ASSET_VERSION: ${STATIC_ASSET_VERSION:-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "8080"
    networks:
      - osint

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "80"
    networks:
      - osint

volumes:
  redis-data:

networks:
  osint:
    driver: bridge
