<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Intelligence Atelier</title>
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            atelier: {
              paper: "#FFFDF9",
              paperSoft: "#F5EDE0",
              ink: "#1F2A29",
              moss: "#65706A",
              forest: "#27433C",
              sage: "#96A79B",
              gold: "#B88C52",
              goldDeep: "#8D6430",
              line: "rgba(62, 69, 63, 0.12)"
            }
          },
          fontFamily: {
            sans: ["Manrope", "sans-serif"],
            display: ["Fraunces", "serif"]
          },
          boxShadow: {
            paper: "0 22px 70px rgba(114, 97, 73, 0.11)",
            card: "0 20px 55px rgba(121, 102, 72, 0.12)"
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link rel="stylesheet" href="./styles.css?v=__STATIC_ASSET_VERSION_VALUE__" />
  <link rel="stylesheet" href="./ui/pencil-loader.css?v=__STATIC_ASSET_VERSION_VALUE__" />
  <link rel="stylesheet" href="./ui/launch-button.css?v=__STATIC_ASSET_VERSION_VALUE__" />
</head>
  <body class="text-atelier-ink antialiased">
  <div id="root"></div>
  <script>
    window.__STATIC_ASSET_VERSION__ = "__STATIC_ASSET_VERSION_VALUE__";
    window.OSINT_API_URL = window.OSINT_API_URL || (
      window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
        ? "http://127.0.0.1:8000"
        : "https://osint-tool-for-alchemy-research-analyst.onrender.com/"
    );
    window.addEventListener("load", () => {
      import("./ui/app.js?v=__STATIC_ASSET_VERSION_VALUE__");
    });
  </script>
</body>
</html>
