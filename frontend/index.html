<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Intelligence Atelier</title>
  <meta name="osint-api-url" content="" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            atelier: {
              paper: "#FFFDF9",
              paperSoft: "#F5EDE0",
              ink: "#1F2A29",
              moss: "#65706A",
              forest: "#27433C",
              sage: "#96A79B",
              gold: "#B88C52",
              goldDeep: "#8D6430",
              line: "rgba(62, 69, 63, 0.12)"
            }
          },
          fontFamily: {
            sans: ["Manrope", "sans-serif"],
            display: ["Fraunces", "serif"]
          },
          boxShadow: {
            paper: "0 22px 70px rgba(114, 97, 73, 0.11)",
            card: "0 20px 55px rgba(121, 102, 72, 0.12)"
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link rel="stylesheet" href="./styles.css?v=__STATIC_ASSET_VERSION_VALUE__" />
  <link rel="stylesheet" href="./ui/pencil-loader.css?v=__STATIC_ASSET_VERSION_VALUE__" />
  <link rel="stylesheet" href="./ui/launch-button.css?v=__STATIC_ASSET_VERSION_VALUE__" />
</head>
  <body class="text-atelier-ink antialiased">
  <div id="root"></div>
  <script>
    const isLocalHost =
      window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
    const resolvedStaticVersion = isLocalHost
      ? String(Date.now())
      : "__STATIC_ASSET_VERSION_VALUE__";
    window.__STATIC_ASSET_VERSION__ = resolvedStaticVersion;
    const configuredApiUrl =
      window.OSINT_API_URL ||
      window.__OSINT_API_URL__ ||
      document.querySelector('meta[name="osint-api-url"]')?.content?.trim();

    function normalizeApiOrigin(value) {
      const normalized = String(value || "").trim().replace(/\/+$/, "");
      return normalized || "";
    }

    function uniqueValues(values) {
      const output = [];
      values.forEach((value) => {
        const normalized = normalizeApiOrigin(value);
        if (normalized && !output.includes(normalized)) {
          output.push(normalized);
        }
      });
      return output;
    }

    async function loadClientConfig() {
      const candidatePaths = ["./client-config.json", "/client-config.json"];
      for (const path of candidatePaths) {
        try {
          const response = await fetch(path, { cache: "no-store" });
          if (!response.ok) {
            continue;
          }

          const payload = await response.json();
          if (payload && typeof payload === "object") {
            return payload;
          }
        } catch {
        }
      }

      return {
        enabledSections: ["trends", "drivers", "competitive_landscape"],
        followUpEnabled: true,
      };
    }

    async function isReachableApiOrigin(origin) {
      const controller = typeof AbortController === "function" ? new AbortController() : null;
      const timeoutId = controller ? window.setTimeout(() => controller.abort(), 5000) : null;
      try {
        const response = await fetch(`${origin}/health`, {
          method: "GET",
          mode: "cors",
          cache: "no-store",
          signal: controller ? controller.signal : undefined,
        });
        return response.ok;
      } catch {
        return false;
      } finally {
        if (timeoutId) {
          window.clearTimeout(timeoutId);
        }
      }
    }

    async function resolveApiOrigin() {
      if (configuredApiUrl) {
        return normalizeApiOrigin(configuredApiUrl);
      }

      if (isLocalHost) {
        return "http://127.0.0.1:8000";
      }

      const candidateOrigins = uniqueValues([
        window.location.origin,
        "https://osint-tool-backend.onrender.com",
        "https://osint-tool-for-alchemy-research-analyst-focused.onrender.com",
        "https://osint-tool-for-alchemy-research-analyst.onrender.com",
      ]);

      for (const candidate of candidateOrigins) {
        if (await isReachableApiOrigin(candidate)) {
          return candidate;
        }
      }

      return candidateOrigins[0] || "";
    }

    window.addEventListener("load", async () => {
      window.OSINT_API_URL = await resolveApiOrigin();
      window.OSINT_CLIENT_CONFIG = await loadClientConfig();
      import(`./ui/app.js?v=${encodeURIComponent(resolvedStaticVersion)}`);
    });
  </script>
</body>
</html>
